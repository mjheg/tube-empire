<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <radialGradient id="bodyGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f0d0a0"/>
      <stop offset="40%" stop-color="#d4a574"/>
      <stop offset="80%" stop-color="#b8864a"/>
      <stop offset="100%" stop-color="#9c7040"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#faf5ee"/>
      <stop offset="100%" stop-color="#e8d5b8"/>
    </radialGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,130,130,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,130,130,0)"/>
    </radialGradient>
    <radialGradient id="earInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8bbd0"/>
      <stop offset="100%" stop-color="#e091a8"/>
    </radialGradient>
  </defs>
  <ellipse cx="60" cy="88" rx="35" ry="8" fill="rgba(0,0,0,0.1)"/>
  <ellipse cx="58" cy="82" rx="5" ry="4" fill="#c4956a" transform="rotate(-15,58,82)"/>
  <ellipse cx="60" cy="50" rx="38" ry="32" fill="url(#bodyGrad)"/>
  <ellipse cx="60" cy="55" rx="24" ry="20" fill="url(#bellyGrad)"/>
  <ellipse cx="30" cy="22" rx="12" ry="14" fill="#c4956a" transform="rotate(-15,30,22)"/>
  <ellipse cx="30" cy="22" rx="7" ry="9" fill="url(#earInner)" transform="rotate(-15,30,22)"/>
  <ellipse cx="90" cy="22" rx="12" ry="14" fill="#c4956a" transform="rotate(15,90,22)"/>
  <ellipse cx="90" cy="22" rx="7" ry="9" fill="url(#earInner)" transform="rotate(15,90,22)"/>
  <!-- Bigger blush cheeks -->
  <circle cx="33" cy="52" r="14" fill="url(#cheekGrad)"/>
  <circle cx="87" cy="52" r="14" fill="url(#cheekGrad)"/>
  <!-- Happy squinted eyes -->
  <path d="M43 40 Q47 44 51 40" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M69 40 Q73 44 77 40" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="60" cy="50" rx="3.5" ry="2.5" fill="#e8888a"/>
  <!-- Smile -->
  <path d="M53 55 Q60 62 67 55" stroke="#a06050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <g stroke="rgba(120,100,80,0.35)" stroke-width="0.7" fill="none">
    <line x1="50" y1="52" x2="20" y2="48"/>
    <line x1="50" y1="54" x2="18" y2="54"/>
    <line x1="50" y1="56" x2="20" y2="60"/>
    <line x1="70" y1="52" x2="100" y2="48"/>
    <line x1="70" y1="54" x2="102" y2="54"/>
    <line x1="70" y1="56" x2="100" y2="60"/>
  </g>
  <ellipse cx="42" cy="75" rx="6" ry="4" fill="#e0bf98" transform="rotate(-10,42,75)"/>
  <ellipse cx="78" cy="75" rx="6" ry="4" fill="#e0bf98" transform="rotate(10,78,75)"/>
  <!-- Hearts -->
