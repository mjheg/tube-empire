<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="50%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="52" cy="85" rx="38" ry="7" fill="rgba(0,0,0,0.12)"/>
  <!-- House body -->
  <rect x="10" y="20" width="80" height="60" rx="10" fill="url(#houseGrad)"/>
  <!-- Roof -->
  <rect x="10" y="20" width="80" height="22" rx="10" ry="10" fill="url(#roofGrad)"/>
  <!-- Roof highlight -->
  <rect x="15" y="22" width="40" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Door (entrance hole) -->
  <ellipse cx="50" cy="65" rx="14" ry="16" fill="#1b5e20"/>
  <ellipse cx="50" cy="65" rx="11" ry="13" fill="#0d3010"/>
  <!-- Inner shadow -->
  <ellipse cx="50" cy="67" rx="8" ry="9" fill="#061a08"/>
  <!-- Window -->
  <rect x="68" y="38" width="12" height="10" rx="3" fill="#ffee58" stroke="#558b2f" stroke-width="1"/>
  <line x1="74" y1="38" x2="74" y2="48" stroke="#558b2f" stroke-width="1"/>
  <line x1="68" y1="43" x2="80" y2="43" stroke="#558b2f" stroke-width="1"/>
  <!-- Roof decoration -->
  <circle cx="50" cy="18" r="5" fill="#fdd835"/>
</svg>
